{{ partial "header.html" . }}

<body style="margin: 0; padding: 0; background: transparent !important; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden;">
    <!-- 仅保留验证组件本身，彻底去掉多余的网页端边框和标题 -->
    <div id="captcha-widget-container" style="display: inline-block; min-height: 65px;"></div>

    <script src="{{ absURL "js/common.js" }}"></script>
    <script type="text/javascript">
        let retries = 0;
        function initTurnstile() {
            const container = document.getElementById('captcha-widget-container');
            if (window.turnstile) {
                // 动态获取系统或文档主题，让验证框自动适配深色模式，不再刺眼！
                let userTheme = 'auto';
                if (document.documentElement.classList.contains('dark') || 
                    document.body.classList.contains('dark') || 
                    (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                    userTheme = 'dark';
                }
                
                window.turnstile.render(container, {
                    sitekey: window.SITE_KEY || '0x4AAAAAADMDPBploX286xsn',
                    theme: userTheme,
                    callback: (token) => {
                        console.log("Turnstile solved! Token:", token);
                        // 优先通过 Flutter JS Channel 传递给 APP 原生客户端
                        if (window.TurnstileChannel && typeof window.TurnstileChannel.postMessage === 'function') {
                            window.TurnstileChannel.postMessage(token);
                        }
                    },
                    'error-callback': () => {
                        if (window.TurnstileChannel && typeof window.TurnstileChannel.postMessage === 'function') {
                            window.TurnstileChannel.postMessage('error');
                        }
                    },
                    'expired-callback': () => {
                        if (window.TurnstileChannel && typeof window.TurnstileChannel.postMessage === 'function') {
                            window.TurnstileChannel.postMessage('expired');
                        }
                    }
                });
            } else {
                retries++;
                if (retries > 80) { // 8 seconds timeout
                    container.innerHTML = '<div style="color: #ff4d4f; font-weight: 500; font-family: sans-serif; font-size: 13px;">安全验证环境加载超时，请重试</div>';
                } else {
                    setTimeout(initTurnstile, 100);
                }
            }
        }
        document.addEventListener('DOMContentLoaded', initTurnstile);
    </script>
</body>
</html>
